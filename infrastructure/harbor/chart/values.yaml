harbor:
  persistence:
    persistentVolumeClaim:
      database:
        annotations:
          k8up.io/backup: "true"
      registry:
        size: 10Gi
        annotations:
          k8up.io/backup: "true"
  expose:
    type: NodePort
    tls:
      enabled: false
  externalURL: https://harbor.example.com

network:
  hostname: example.com
  gateway:
    name: traefik-gateway
    listener: websecure
    namespace: gateway
