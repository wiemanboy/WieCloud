environment:
  hostname: example.com
  gateway:
    name: example-gateway
    listener: web-example
    namespace: example

seaweedfs:
  name: backup-s3
  endpoint: k8up.s3.example.com
  bucket: backup-bucket
  secret:
    name: s3-secret

k8up:
  backend:
    repoPasswordSecretRef:
      name: backup-repo
      key: password

  default:
    schedule:
      backup: "*/5 * * * *"
      check: "0 1 * * 1"
      prune: "0 1 * * 0"
    retention:
      keepLast: 5
      keepDaily: 14

