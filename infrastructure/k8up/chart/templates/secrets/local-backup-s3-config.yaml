apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: local-backup-s3-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalsecrets.k8sSecretStore.name }}
  target:
    name: local-s3-config
    template:
      engineVersion: v2
      data:
        seaweedfs_s3_config.json: |
          {
            "identities": [
              {
                "name": "admin",
                "actions": ["Admin"],
                "credentials": [
                  {
                    "accessKey": "{{ `{{ index . "access-key" }}` }}",
                    "secretKey": "{{ `{{ index . "secret-key" }}` }}"
                  }
                ]
              }
            ]
          }
  data:
  - secretKey: access-key
    remoteRef:
      key: local-backup-s3-credentials
      property: access-key

  - secretKey: secret-key
    remoteRef:
      key: local-backup-s3-credentials
      property: secret-key
