apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: local-s3-credentials
  namespace: default
spec:
  secretStoreRef:
    kind: SecretStore
    name: {{ .Values.externalsecrets.k8sSecretStore.name }}
  target:
    name: local-s3-credentials
  data:
  - secretKey: accessKey
    remoteRef:
      key: local-s3-credentials
      property: accessKey

  - secretKey: secretKey
    remoteRef:
      key: local-s3-credentials
      property: secretKey
