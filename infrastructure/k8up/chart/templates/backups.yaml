{{- range $index, $backup := .Values.k8up.backups }}
apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: {{ $backup.name }}
  namespace: {{ $backup.namespace }}
spec:
  backend:
    repoPasswordSecretRef:
      {{ toYaml $.Values.k8up.backend.repoPasswordSecretRef | nindent 6 }}
    s3:
      endpoint: https://{{ $.Values.seaweedfs.endpoint }}
      bucket: {{ $.Values.seaweedfs.bucket }}
      accessKeyIDSecretRef:
        name: {{ printf "%s-%s" $backup.name "s3-backup-secret" }}
        key: accessKey
      secretAccessKeySecretRef:
        name: {{ printf "%s-%s" $backup.name "s3-backup-secret" }}
        key: secretKey
  backup:
    schedule: {{ $backup.schedule.backup | default $.Values.k8up.default.schedule.backup }}
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 0

  check:
    schedule: {{ $backup.schedule.check | default $.Values.k8up.default.schedule.check }}

  prune:
    schedule: {{ $backup.schedule.prune | default $.Values.k8up.default.schedule.prune }}
    retention:
      keepLast: {{ $backup.retention.keepLast | default $.Values.k8up.default.retention.keepLast }}
      keepDaily: {{ $backup.retention.keepDaily | default $.Values.k8up.default.retention.keepDaily }}
---
{{- end }}
