apiVersion: k8up.io/v1
kind: Restore
metadata:
  name: restore-test
spec:
  restoreMethod:
    folder:
      claimName: busybox-pvc
  backend:
    repoPasswordSecretRef:
      name: backup-repo
      key: password
    s3:
      endpoint: https://{{ .Values.seaweedfs.endpoint }}
      bucket: {{ .Values.seaweedfs.bucket }}
      accessKeyIDSecretRef:
        name: {{ .Values.seaweedfs.secret.name }}
        key: {{ .Values.seaweedfs.secret.accessKey }}
      secretAccessKeySecretRef:
        name: {{ .Values.seaweedfs.secret.name }}
        key: {{ .Values.seaweedfs.secret.secretKey }}
---
