apiVersion: seaweed.seaweedfs.com/v1
kind: Seaweed
metadata:
  name: {{ .Values.seaweedfs.name }}
spec:
  image: chrislusf/seaweedfs:latest
  master:
    replicas: 1
    volumeSizeLimitMB: 1024
  volume:
    replicas: 1
    requests:
      storage: 100Gi
  filer:
    replicas: 1
    s3:
      enabled: true
      configSecret:
        name: {{ .Values.seaweedfs.secret.name }}
        key: seaweedfs_s3_config.json
    config: |
      [leveldb2]
      enabled = true
      dir = "/data/filerldb2"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.seaweedfs.name }}
spec:
  parentRefs:
    - name: {{ .Values.environment.gateway.name }}
      sectionName: {{ .Values.environment.gateway.listener }}
      namespace: {{ .Values.environment.gateway.namespace }}

  hostnames:
    - {{ .Values.seaweedfs.endpoint }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - name: "{{ .Values.seaweedfs.name }}-filer"
          namespace: {{ .Release.Namespace }}
          port: 8333
---
{{- if not (lookup "v1" "Secret" .Release.Namespace .Values.seaweedfs.secret.name) }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.seaweedfs.secret.name }}
type: Opaque
data:
  seaweedfs_s3_config.json: |
    {
      "identities": [
        {
          "actions": [
            "Read",
            "List",
            "Write"
          ],
          "credentials": [
            {
              "accessKey": {{ randAlphaNum 50 | quote }},
              "secretKey": {{ randAlphaNum 50 | quote }}
            }
          ],
          "name": "k8up-s3-user"
        },
        {
          "actions": [
            "Admin"
          ],
          "credentials": [
            {
              "accessKey": {{ randAlphaNum 50 | quote }},
              "secretKey": {{ randAlphaNum 50 | quote }}
            }
          ],
          "name": "deploy-s3-user"
        }
      ]
    }
{{- end }}
