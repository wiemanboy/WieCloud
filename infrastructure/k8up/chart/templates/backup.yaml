apiVersion: k8up.io/v1
kind: Backup
metadata:
  name: backup-test
spec:
  failedJobsHistoryLimit: 2
  successfulJobsHistoryLimit: 2

  labelSelectors:
    - matchExpressions:
      - key: wieman.cloud/backup
        operator: In
        values:
          - "true"

  backend:
    repoPasswordSecretRef:
      name: backup-repo
      key: password
    s3:
      endpoint: https://{{ .Values.seaweedfs.endpoint }}
      bucket: {{ .Values.seaweedfs.bucket }}
      accessKeyIDSecretRef:
        name: {{ .Values.seaweedfs.secret.name }}
        key: {{ .Values.seaweedfs.secret.accessKey }}
      secretAccessKeySecretRef:
        name: {{ .Values.seaweedfs.secret.name }}
        key: {{ .Values.seaweedfs.secret.secretKey }}
---
