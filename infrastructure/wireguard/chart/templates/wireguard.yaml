apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: wireguard
  name: wireguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wireguard
  template:
    metadata:
      labels:
        app: wireguard
    spec:
      hostNetwork: true
      nodeName: talos-worker-0
      containers:
      - image: linuxserver/wireguard:1.0.20250521
        name: wireguard
        env:
        - name:  SERVERURL
          value: wireguard.{{ .Values.environment.hostname }}
        - name: PEERS
          value: "1"
        - name: PEERDNS
          value: "1.1.1.1"
        - name: LOG_CONFS
          value: "true"
        securityContext:
          privileged: true
          capabilities:
            add:
              - NET_ADMIN
