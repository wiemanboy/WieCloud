argo-cd:
  configs:
    params:
      server.insecure: true
      controller.diff.server.side: true
    cm:
      admin.enabled: "false"
      url: https://argo.example.com
      exec.enabled: true
      oidc.config: "overwritten"
    rbac:
      policy.csv: |
        g, /infra/argocd/admin, role:admin
        g, /infra/argocd/reader, role:readonly
  server:
    httproute:
      enabled: true
      parentRefs:
        - name: example-gateway
          sectionName: web-example
          namespace: example
      hostnames:
        - argo.example.com
    resources:
      limits:
        memory: 256Gi
      request:
        cpu: 15m
        memory: 128Mi

  controller:
    resources:
      limits:
        memory: 1Gi
      request:
        cpu: 250m
        memory: 768Mi

  repoServer:
    resources:
      limits:
        memory: 384Gi
      request:
        cpu: 50m
        memory: 256Mi

  redis:
    resources:
      limits:
        memory: 64Mi
      request:
        cpu: 5m
        memory: 32Mi

  applicationSet:
    resources:
      limits:
        memory: 53Mi
      request:
        cpu: 2m
        memory: 32Mi

  dex:
    enabled: false

  notifications:
    enabled: false
