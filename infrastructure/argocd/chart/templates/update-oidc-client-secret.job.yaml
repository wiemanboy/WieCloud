apiVersion: v1
kind: ServiceAccount
metadata:
  name: update-oidc-client-secret
  namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: update-oidc-client-secret
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["argocd-secret"]
  verbs: ["get", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: update-oidc-client-secret
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: update-oidc-client-secret
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: update-oidc-client-secret

---
apiVersion: batch/v1
kind: Job
metadata:
  name: update-oidc-client-secret
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: update-oidc-client-secret
      restartPolicy: Never
      containers:
      - name: update-oidc-client-secret
        image: alpine/kubectl:1.34.0
        env:
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: argo-client-secret
              key: secret
        command:
        - /bin/sh
        - -c
        - |
          kubectl -n {{ .Release.Namespace }} patch secret argocd-secret \
            --type=merge \
            --patch "{\"stringData\": {\"oidc.keycloak.clientSecret\": \"${CLIENT_SECRET}\"}}"
