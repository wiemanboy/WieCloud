apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-server-cnpg-backup-actions
rules:
  - apiGroups:
      - postgresql.cnpg.io
    resources:
      - backups
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-server-cnpg-backup-actions
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-server-cnpg-backup-actions
subjects:
  - kind: ServiceAccount
    name: argocd-server
    namespace: {{ .Release.Namespace }}
