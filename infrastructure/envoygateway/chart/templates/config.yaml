apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-proxy
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        annotations:
          external-dns.alpha.kubernetes.io/hostname: {{ .Values.network.hostname }}
          external-dns.alpha.kubernetes.io/target: {{ .Values.network.externalIp }}
        patch:
          type: StrategicMerge
          value:
            metadata:
              labels:
                expose: l2
      envoyDeployment:
        pod:
          nodeSelector:
            kubernetes.io/hostname: talos-worker-0
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  containers:
                  - name: envoy
                    resources:
                      limits:
                        memory: 128Mi
                      requests:
                        cpu: 250m
                        memory: 64Mi
                  - name: shutdown-manager
                    resources:
                      limits:
                        memory: 48Mi
                      requests:
                        cpu: 1m
                        memory: 24Mi
