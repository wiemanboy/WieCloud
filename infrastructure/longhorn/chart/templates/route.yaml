apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-frontend
spec:
  parentRefs:
    - name: {{ .Values.network.gateway.name }}
      sectionName: {{ .Values.network.gateway.listener }}
      namespace: {{ .Values.network.gateway.namespace }}

  hostnames:
    - storage.{{ .Values.network.hostname }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - name: longhorn-frontend
          namespace: {{ .Release.Namespace }}
          port: 80

      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ .Values.auth.basic.name }}

