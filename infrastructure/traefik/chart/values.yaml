traefik:
  service:
    externalIps:
      - 0.0.0.0
    loadbalancerIp: 0.0.0.0
    annotations:
      external-dns.alpha.kubernetes.io/hostname: example.com
      external-dns.alpha.kubernetes.io/target: 0.0.0.0
  providers:
    kubernetesGateway:
      enabled: true
      experimentalChannel: true
  gateway:
    annotations:
      external-dns.alpha.kubernetes.io/target: example.com
    listeners:
      web:
        port: 80
        protocol: HTTP
      websecure:
        port: 443
        protocol: HTTPS
        namespacePolicy:
          from: All
        mode: Terminate
        certificateRefs:
          - name: letsencrypt-secret
            kind: Secret
      minecraft:
        port: 25565
        protocol: TCP
        namespacePolicy:
          from: All

  ports:
    web:
      port: 80
      redirections:
        entryPoint:
          to: websecure
          scheme: https
    websecure:
      port: 443
      tls:
        enabled: true
    minecraft:
      port: 25565
      expose:
        default: true

  tlsStore:
    default:
      defaultCertificate:
        secretName: letsencrypt-secret
