keycloak:
  db:
    vendor: postgres
    host: postgres-db
    username:
      secret: keycloak-db-credentials
      key: username
    password:
      secret: keycloak-db-credentials
      key: password

network:
  hostname: example.com
  gateway:
    name: example-gateway
    listener: web-example
    namespace: example

images:
  keycloakserver:
    image:
      registry: example.com
      repository: keycloak/keycloak
      version: 26.6.2

  postgres:
    image:
      registry: example.com
      repository: library/postgres
      version: 18.4

  tofudeployer:
    image:
      registry: example.com
      repository: products/tofudeployer
      version: 0.0.0
  