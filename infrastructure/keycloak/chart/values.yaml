keycloak:
  db:
    vendor: postgres
    host: postgres-db
    username:
      secret: keycloak-db-credentials
      key: username
    password:
      secret: keycloak-db-credentials
      key: password

network:
  hostname: example.com
  gateway:
    name: example-gateway
    listener: web-example
    namespace: example

images:
  postgres:
    image:
      registry: example.com
      repository: library/postgres
      version: 18.4
