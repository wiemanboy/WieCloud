kyverno:
  config:
    excludeKyvernoNamespace: false

  admissionController:
    container:
      resources:
        limits:
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 64Mi

  backgroundController:
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 4m
        memory: 64Mi

  cleanupController:
    rbac:
      clusterRole:
        extraResources:
          - apiGroups:
              - batch
            resources:
              - jobs
            verbs:
              - delete
              - list
              - watch

    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 3m
        memory: 64Mi

  reportsController:
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 3m
        memory: 128Mi
  crd:
    migration:
      podResources:
        resources:
          limits:
            cpu: null
            memory: 256Mi
          requests:
            cpu: 5m
            memory: 128Mi
