environment:
  hostname: example.com
  gateway:
    name: example-gateway
    listener: web-example
    namespace: example

garage:
  garage:
    s3:
      api:
        region: "garage"
        rootDomain: ".s3.example.com"
      web:
        rootDomain: ".web.example.com"

  persistence:
    meta:
      size: 100Mi
    data:
      size: 100Mi

  deployment:
    kind: StatefulSet
    replicaCount: 1
