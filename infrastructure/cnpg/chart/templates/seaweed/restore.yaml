{{ if .Values.seaweedfs.restore.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: seaweed-restore
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: restore
          image: rclone/rclone:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              for bucket in /backup/buckets/*; do
                name=$(basename "$bucket")
                echo "Restoring $name..."
                rclone sync "$bucket" ":s3:$name" \
                  --s3-provider SeaweedFS \
                  --s3-endpoint http://backup-s3-filer:8333 \
                  --s3-access-key-id "$S3_ACCESS_KEY" \
                  --s3-secret-access-key "$S3_SECRET_KEY" \
                  --bwlimit 10M \
                  --progress
              done
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cnpg-backup-s3-credentials
                  key: accessKey
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cnpg-backup-s3-credentials
                  key: secretKey
          volumeMounts:
            - name: backup
              mountPath: /backup

      volumes:
        - name: backup
          persistentVolumeClaim:
            claimName: seaweed-backup
{{ end }}
