---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: k8up-s3-credentials
spec:
  length: 42
  symbolCharacters: '~!@#$%^&*()_+`-={}|[]\:"<>?,./'
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: k8up-s3-credentials
spec:
  refreshInterval: 0s
  target:
    name: k8up-s3-credentials
  dataFrom:
  - sourceRef:
       generatorRef:
         apiVersion: generators.external-secrets.io/v1alpha1
         kind: Password
         name: k8up-s3-credentials
    rewrite:
    - regexp:
        source: "(.*)"
        target: "accessKey"

  - sourceRef:
       generatorRef:
         apiVersion: generators.external-secrets.io/v1alpha1
         kind: Password
         name: k8up-s3-credentials
    rewrite:
    - regexp:
        source: "(.*)"
        target: "secretKey"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-config
spec:
  target:
    name: s3-config
    template:
      engineVersion: v2
      data:
        seaweedfs_s3_config.json: |
          {
            "identities": [
              {
                "name": "admin",
                "actions": ["Admin"],
                "credentials": [
                  {
                    "accessKey": "{{ `{{ .accessKey }}` }}",
                    "secretKey": "{{ `{{ .secretKey }}` }}"
                  }
                ]
              }
            ]
          }
  dataFrom:
    - extract:
        key: k8up-s3-credentials
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-credentials
spec:
  target:
    name: s3-credentials
  dataFrom:
    - extract:
        key: k8up-s3-credentials
