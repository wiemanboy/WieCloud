---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: k8up-s3-credentials
spec:
  length: 42
  symbolCharacters: '~!@#$%^&*()_+`-={}|[]\:"<>?,./'
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: k8up-s3-credentials
spec:
  refreshInterval: 0s
  target:
    name: k8up-s3-credentials
  dataFrom:
  - sourceRef:
       generatorRef:
         apiVersion: generators.external-secrets.io/v1alpha1
         kind: Password
         name: k8up-s3-credentials
    rewrite:
    - regexp:
        source: "(.*)"
        target: "accessKey"

  - sourceRef:
       generatorRef:
         apiVersion: generators.external-secrets.io/v1alpha1
         kind: Password
         name: k8up-s3-credentials
    rewrite:
    - regexp:
        source: "(.*)"
        target: "secretKey"
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: k8s-store
  namespace: default
spec:
  provider:
    kubernetes:
      remoteNamespace: {{ .Release.Namespace }}
      auth:
        serviceAccount:
          name: "k8s-store"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-config
  namespace: default
spec:
  secretStoreRef:
    kind: SecretStore
    name: k8s-store
  target:
    name: s3-config
    template:
      engineVersion: v2
      data:
        seaweedfs_s3_config.json: |
          {
            "identities": [
              {
                "name": "admin",
                "actions": ["Admin"],
                "credentials": [
                  {
                    "accessKey": "{{ `{{ .accessKey }}` }}",
                    "secretKey": "{{ `{{ .secretKey }}` }}"
                  }
                ]
              }
            ]
          }
  data:
  - secretKey: accessKey
    remoteRef:
      key: k8up-s3-credentials
      property: accessKey

  - secretKey: secretKey
    remoteRef:
      key: k8up-s3-credentials
      property: secretKey
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-credentials
  namespace: default
spec:
  secretStoreRef:
    kind: SecretStore
    name: k8s-store
  target:
    name: k8up-s3-credentials
  data:
  - secretKey: accessKey
    remoteRef:
      key: k8up-s3-credentials
      property: accessKey

  - secretKey: secretKey
    remoteRef:
      key: k8up-s3-credentials
      property: secretKey
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-store
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: v1
kind: ServiceAccountt
metadata:
  name: k8s-store
  labels:
    app: k8s-store
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-store
subjects:
- kind: ServiceAccount
  name: k8s-store
roleRef:
  kind: Role
  name: k8s-store
  apiGroup: rbac.authorization.k8s.io
