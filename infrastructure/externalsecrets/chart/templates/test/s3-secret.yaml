apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: s3-secret
spec:
  length: 42
  symbolCharacters: '~!@#$%^&*()_+`-={}|[]\:"<>?,./'
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-credentials
spec:
  target:
    name: s3-credentials
    template:
      engineVersion: v2
      data:
        accessKey: "{{ `{{ .accessKey }}` }}"
        secretKey: "{{ `{{ .secretKey }}` }}"

  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: s3-secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-config
spec:
  target:
    name: s3-config
    template:
      engineVersion: v2
      data:
        seaweedfs_s3_config.json: |
          {
            "identities": [
              {
                "name": "admin",
                "actions": ["Admin"],
                "credentials": [
                  {
                    "accessKey": "{{ `{{ .accessKey }}` }}",
                    "secretKey": "{{ `{{ .secretKey }}` }}"
                  }
                ]
              }
            ]
          }
  dataFrom:
    - extract:
        key: s3-credentials
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-credentials-copy
spec:
  target:
    name: s3-credentials-copy
  dataFrom:
    - extract:
        key: s3-credentials
