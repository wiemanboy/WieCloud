apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: local-backup-s3-credentials
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: local-backup-s3-secret-store
  target:
    name: local-backup-s3-credentials
  data:
  - secretKey: access-key
    remoteRef:
      key: local-backup-s3-credentials
      property: access-key

  - secretKey: secret-key
    remoteRef:
      key: local-backup-s3-credentials
      property: secret-key
---
