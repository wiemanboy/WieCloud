apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: local-backup-s3-credentials
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: local-backup-s3-secret-store
  target:
    name: local-backup-s3-credentials
  data:
  - secretKey: accessKey
    remoteRef:
      key: local-backup-s3-credentials
      property: accessKey

  - secretKey: secretKey
    remoteRef:
      key: local-backup-s3-credentials
      property: secretKey
---
