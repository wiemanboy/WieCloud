---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: mariadb-galera-secrets
spec:
  length: 20
  digits: 10
  symbols: 0
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mariadb-galera-secrets
spec:
  refreshInterval: 0s
  target:
    name: mariadb-galera-secrets
  dataFrom:
  - sourceRef:
       generatorRef:
         apiVersion: generators.external-secrets.io/v1alpha1
         kind: Password
         name: mariadb-galera-secrets
    rewrite:
    - regexp:
        source: "(.*)"
        target: "mariadb-root-password"
  - sourceRef:
       generatorRef:
         apiVersion: generators.external-secrets.io/v1alpha1
         kind: Password
         name: mariadb-galera-secrets
    rewrite:
    - regexp:
        source: "(.*)"
        target: "mariadb-galera-secret-backup"
