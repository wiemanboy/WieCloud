apiVersion: seaweed.seaweedfs.com/v1
kind: Seaweed
metadata:
  name: seaweed
spec:
  image: chrislusf/seaweedfs:latest
  master:
    replicas: 1
    volumeSizeLimitMB: 1024
  volume:
    replicas: 1
    requests:
      storage: 2Gi
  filer:
    replicas: 1
    s3:
      enabled: true
      configSecret:
        name: test-secret
        key: seaweedfs_s3_config.json
    config: |
      [leveldb2]
      enabled = true
      dir = "/data/filerldb2"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seaweed-filer
spec:
  parentRefs:
    - name: {{ .Values.environment.gateway.name }}
      sectionName: {{ .Values.environment.gateway.listener }}
      namespace: {{ .Values.environment.gateway.namespace }}

  hostnames:
    - filer.{{ .Values.environment.hostname }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - name: seaweed-filer
          namespace: {{ .Release.Namespace }}
          port: 8888
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seaweed-s3
spec:
  parentRefs:
    - name: {{ .Values.environment.gateway.name }}
      sectionName: {{ .Values.environment.gateway.listener }}
      namespace: {{ .Values.environment.gateway.namespace }}

  hostnames:
    - s3.{{ .Values.environment.hostname }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - name: seaweed-filer
          namespace: {{ .Release.Namespace }}
          port: 8333
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seaweed-volume-0
spec:
  parentRefs:
    - name: {{ .Values.environment.gateway.name }}
      sectionName: {{ .Values.environment.gateway.listener }}
      namespace: {{ .Values.environment.gateway.namespace }}

  hostnames:
    - seaweed-volume-0.{{ .Values.environment.hostname }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - name: seaweed-volume-0
          namespace: {{ .Release.Namespace }}
          port: 8444
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-patch-ownerrefs
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: default
      containers:
      - name: patch-ownerrefs
        image: alpine/kubectl:1.34.0
        command:
          - /bin/sh
          - -c
          - |
            # Get the Seaweed UID
            SEAWEED_UID=$(kubectl get seaweed seaweed -o jsonpath='{.metadata.uid}')

            # Patch HTTPRoutes to add ownerReference
            for hr in seaweed-filer seaweed-s3 seaweed-volume-0; do
              kubectl patch httproute $hr -n {{ .Release.Namespace }} --type=json -p "[{\"op\":\"add\",\"path\":\"/metadata/ownerReferences/-\",\"value\":{\"apiVersion\":\"seaweed.seaweedfs.com/v1\",\"kind\":\"Seaweed\",\"name\":\"seaweed\",\"uid\":\"$SEAWEED_UID\"}}]"
            done
