apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-patch-ownerrefs-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-patch-ownerrefs-role
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: ["seaweed.seaweedfs.com"]
    resources: ["seaweeds"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-patch-ownerrefs-rolebinding
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-patch-ownerrefs-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-patch-ownerrefs-role
  apiGroup: rbac.authorization.k8s.io
