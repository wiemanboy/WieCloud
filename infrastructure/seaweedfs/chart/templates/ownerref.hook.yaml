apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-patch-ownerrefs
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-patch-ownerrefs-sa
      restartPolicy: Never
      containers:
      - name: patch-ownerrefs
        image: alpine/kubectl:1.34.0
        command:
          - /bin/sh
          - -c
          - |
            NAMESPACE={{ .Release.Namespace }}
            SEAWEED_UID=$(kubectl get seaweed seaweed -n $NAMESPACE -o jsonpath='{.metadata.uid}')

            for hr in seaweed-filer seaweed-s3 seaweed-volume-0; do
              kubectl patch httproute $hr -n $NAMESPACE --type=json -p "[
                {
                  \"op\": \"add\",
                  \"path\": \"/metadata/ownerReferences\",
                  \"value\": [
                    {
                      \"apiVersion\": \"seaweed.seaweedfs.com/v1\",
                      \"kind\": \"Seaweed\",
                      \"name\": \"seaweed\",
                      \"uid\": \"$SEAWEED_UID\",
                      \"controller\": true,
                      \"blockOwnerDeletion\": true
                    }
                  ]
                }
              ]"
            done
