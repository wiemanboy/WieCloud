{{ define "shared.backups.tpl" }}
{{ range $index, $backup := .backups }}

{{- if not (dig "disable" "schedule" false $) }}
{{ include "shared.schedule.tpl" (dict
  "backup" $backup
  "bucket" $.bucket
) }}
---
{{ end }}

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $backup.s3.secret.name }}
spec:
  secretStoreRef: {{ $backup.s3.secret.storeRef | toYaml | nindent 4 }}
  target:
    name: {{ $backup.s3.secret.name }}
  data:
  - secretKey: {{ $backup.s3.secret.accessKey }}
    remoteRef:
      key: {{ $backup.s3.secret.name }}
      property: {{ $backup.s3.secret.accessKey }}

  - secretKey: {{ $backup.s3.secret.secretKey }}
    remoteRef:
      key: {{ $backup.s3.secret.name }}
      property: {{ $backup.s3.secret.secretKey }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $backup.repo.secret.name }}
spec:
  secretStoreRef: {{ $backup.repo.secret.storeRef | toYaml | nindent 4 }}
  target:
    name: {{ $backup.repo.secret.name }}
  data:
  - secretKey: {{ $backup.repo.secret.key }}
    remoteRef:
      key: {{ $backup.repo.secret.name }}
      property: {{ $backup.repo.secret.key }}
---
{{- range $index, $restore := $.restores }}
{{- if and ($restore.enabled) (eq $restore.fromBackup $backup.name) }}
apiVersion: k8up.io/v1
kind: Restore
metadata:
  name: {{ $restore.name }}
spec:
  podSecurityContext:
    fsGroup: 65532
    fsGroupChangePolicy: OnRootMismatch
  restoreMethod:
    folder:
      claimName: {{ $restore.claim.name }}
  {{- if ne ($restore.snapshot | default "") "" }}
  snapshot: {{ $restore.snapshot }}
  {{- end }}
  backend:
    repoPasswordSecretRef:
      name: {{ $backup.repo.secret.name }}
      key: {{ $backup.repo.secret.key }}
    s3:
      endpoint: {{ $backup.s3.endpoint }}
      bucket: {{ $.bucket.name}}
      accessKeyIDSecretRef:
        name: {{ $backup.s3.secret.name }}
        key: {{ $backup.s3.secret.accessKey }}
      secretAccessKeySecretRef:
        name: {{ $backup.s3.secret.name }}
        key: {{ $backup.s3.secret.secretKey }}
---
{{- end }}
{{- end }}
{{- end }}
{{- end }}
