name: Build satisfactory

on:
  pull_request:
    branches:
    - master
    paths:
    - applications/satisfactory/chart**
    - .github/workflows/helm_build_satisfactory.yaml
    - .github/workflows/helm_build.yaml
    - pipeline/build/scripts/helm/**

jobs:
  build:
    name: Build
    uses: ./.github/workflows/helm_build.yaml
    with:
      chart_name: satisfactory
      chart_path: applications/satisfactory/chart
      registry: oci://harbor.wieman.cloud
      repository: applications
    secrets:
      registry_username: ${{ secrets.OCI_REGISTRY_USERNAME }}
      registry_password: ${{ secrets.OCI_REGISTRY_PASSWORD }}
      app_client_id: ${{ secrets.APP_CLIENT_ID }}
      app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
