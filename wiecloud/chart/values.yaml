environment:
  hostname: wieman.cloud
  gateway:
    name: traefik-gateway
    listener: websecure
    namespace: gateway
    authentication:
      basicAuth:
        name: basic-auth
        secret:
          name: server-auth-secret
  oidc:
    provider: Keycloak
    endpoint: https://keycloak.wieman.cloud/realms/wiecloud

backups:
- name: local
  s3:
    endpoint: https://k8up.s3.wieman.cloud
    secret:
      name: backup-s3-secret
      accessKey: accessKey
      secretKey: secretKey
  repo:
    secret:
      name: repo-password-secret
      key: password
  default:
    schedule:
      backup: "0 12 * * *"
      check: "30 12 * * *"
      prune: "0 13 * * *"
    retention:
      keepLast: 5
      keepDaily: 14

applications:
  minecraft:
    deploy: true
    version: 0.5.0-implement-k8up-17ee58b

  nextcloud:
    deploy: true
    version: 0.1.0-implement-k8up-17ee58b

  website:
    deploy: true
    namespace: website

  server: https://kubernetes.default.svc
  repository: harbor.wieman.cloud/applications

infrastructure:
  argocd:
    deploy: true
    version: 0.2.5

  certmanager:
    deploy: true
    version: 0.2.2
    certificate:
      email: wiemanboy@gmail.com
      hostnames:
      - "wieman.cloud"
      - "*.wieman.cloud"
      - "*.s3.wieman.cloud"
      - "wiemanboy.com"
      - "*.wiemanboy.com"
      - "jarnowieman.com"
      - "*.jarnowieman.com"
      - "jarnowieman.nl"
      - "*.jarnowieman.nl"
      - "carnaval.lol"
      - "*.carnaval.lol"

  externaldns:
    deploy: true
    version: 0.0.6

  harbor:
    deploy: true
    version: 1.1.0-implement-k8up-17ee58b

  k8up:
    deploy: true
    version: 0.0.0-implement-k8up-17ee58b

  keycloak:
    deploy: true
    version: 1.1.0-implement-k8up-17ee58b
    restores:
    - name: postgresql-local-restore
      enabled: false
      fromBackup: local
      claim:
        name: data-postgresql-db-0

  longhorn:
    deploy: true
    version: 0.0.6

  metallb:
    deploy: true
    version: 0.0.8

  prometheus:
    deploy: true
    version: 0.0.0

  traefik:
    deploy: true
    version: 0.1.5

  seaweedfs:
    deploy: true
    version: 0.0.0

  server: https://kubernetes.default.svc
  repository: harbor.wieman.cloud/infrastructure

images:
  rconcli:
    image:
      registry: harbor.wieman.cloud
      repository: tools/rconcli
      version: 1.1.3
