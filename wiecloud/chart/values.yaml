environment:
  hostname: wieman.cloud
  gateway:
    name: traefik-gateway
    listener: websecure
    namespace: gateway
    authentication:
      basicAuth:
        name: basic-auth
        secret:
          name: server-auth-secret
  oidc:
    provider: Keycloak
    endpoint: https://keycloak.wieman.cloud/realms/wiecloud

applications:
  minecraft:
    deploy: true
    version: 0.5.0-implement-k8up-f86ccda

  nextcloud:
    deploy: true
    version: 0.1.0-implement-k8up-f86ccda

  website:
    deploy: true
    namespace: website

  server: https://kubernetes.default.svc
  repository: harbor.wieman.cloud/applications

infrastructure:
  argocd:
    deploy: true
    version: 0.2.5

  certmanager:
    deploy: true
    version: 0.2.2
    certificate:
      email: wiemanboy@gmail.com
      hostnames:
      - "wieman.cloud"
      - "*.wieman.cloud"
      - "*.s3.wieman.cloud"
      - "wiemanboy.com"
      - "*.wiemanboy.com"
      - "jarnowieman.com"
      - "*.jarnowieman.com"
      - "jarnowieman.nl"
      - "*.jarnowieman.nl"
      - "carnaval.lol"
      - "*.carnaval.lol"

  externaldns:
    deploy: true
    version: 0.0.6

  harbor:
    deploy: true
    version: 1.1.0-implement-k8up-f86ccda

  k8up:
    deploy: true
    version: 0.0.0-implement-k8up-f86ccda

    default:
      schedule:
        backup: "*/2 * * * *"
        check: "0 1 * * 1"
        prune: "0 1 * * 0"
      retention:
        keepLast: 5
        keepDaily: 14

    backups:
    - name: minecraft
      namespace: minecraft
      bucket: minecraft-backups

    - name: nextcloud
      namespace: nextcloud
      bucket: nextcloud-backups

    - name: harbor
      namespace: harbor
      bucket: harbor-backups

    - name: keycloak
      namespace: keycloak
      bucket: keycloak-backups
    # - name: example-backup
    #   namespace: default
    #   schedule:
    #     backup: "*/5 * * * *"
    #     check: "0 1 * * 1"
    #     prune: "0 1 * * 0"
    #   retention:
    #     keepLast: 5
    #     keepDaily: 14

    restores:

    - name: minecraft-datadir-restore
      namespace: minecraft
      bucket: minecraft-backups
      claim:
        name: minecraft-datadir-restore-test
        deploy: true
        backup: true
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

    - name: nextcloud-restore
      namespace: nextcloud
      bucket: nextcloud-backups
      claim:
        name: nextcloud-restore-test
        deploy: true
        backup: true
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 8Gi

    - name: nextcloud-data-restore
      namespace: nextcloud
      bucket: nextcloud-backups
      claim:
        name: nextcloud-data-restore-test
        deploy: true
        backup: true
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 8Gi

    - name: nextcloud-seaweedfs-filer-restore
      namespace: nextcloud
      bucket: nextcloud-backups
      claim:
        name: seaweedfs-nextcloud-filer-seaweedfs-nextcloud-filer-0
        deploy: true
        backup: true
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi

    - name: nextcloud-seaweedfs-volume-restore
      namespace: nextcloud
      bucket: nextcloud-backups
      claim:
        name: mount0-seaweedfs-nextcloud-volume-0
        deploy: true
        backup: true
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 100Gi

    - name: harbor-registry-restore
      namespace: harbor
      bucket: harbor-backups
      claim:
        name: harbor-registry-restore-test
        deploy: true
        backup: true
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

    - name: harbor-database-restore
      namespace: harbor
      bucket: harbor-backups
      claim:
        name: database-data-harbor-database-0-restore-test
        deploy: true
        backup: true
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi

    - name: keycloak-postgres-restore
      namespace: keycloak
      bucket: keycloak-backups
      claim:
        name: data-postgresql-db-0
        deploy: true
        backup: true
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi

  keycloak:
    deploy: true
    version: 1.1.0-implement-k8up-f86ccda

  longhorn:
    deploy: true
    version: 0.0.6

  metallb:
    deploy: true
    version: 0.0.8

  prometheus:
    deploy: true
    version: 0.0.0

  traefik:
    deploy: true
    version: 0.1.5

  seaweedfs:
    deploy: true
    version: 0.0.0

  server: https://kubernetes.default.svc
  repository: harbor.wieman.cloud/infrastructure

images:
  rconcli:
    image:
      registry: harbor.wieman.cloud
      repository: tools/rconcli
      version: 1.1.3
