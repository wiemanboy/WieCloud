network:
  hostname: wieman.cloud
  externalIp: 85.148.81.86
  ipPool:
    - 192.168.178.201 - 192.168.178.210
  gateway:
    name: default-envoy-gateway
    listener: https
    namespace: envoy-gateway
    certificate:
      email: wiemanboy@gmail.com
      issuerRef:
        name: letsencrypt
        kind: ClusterIssuer
      hostnames:
        - "wieman.cloud"
        - "*.wieman.cloud"
        - "*.s3.wieman.cloud"
        - "wiemanboy.com"
        - "*.wiemanboy.com"
        - "jarnowieman.com"
        - "*.jarnowieman.com"
        - "jarnowieman.nl"
        - "*.jarnowieman.nl"
        - "carnaval.lol"
        - "*.carnaval.lol"

auth:
  oidc:
    provider: Keycloak
    endpoint: https://keycloak.wieman.cloud/realms/wiecloud

backups:
  - name: local
    s3:
      endpoint: https://k8up.s3.wieman.cloud
      secret:
        name: local-backup-s3-credentials
        accessKey: accessKey
        secretKey: secretKey
        storeRef:
          kind: ClusterSecretStore
          name: local-backup-s3-credentials-store
    repo:
      secret:
        name: local-backup-repo-password
        key: password
        storeRef:
          kind: ClusterSecretStore
          name: local-backup-repo-password-store
    default:
      schedule:
        backup: "0 12 * * *"
        check: "30 12 * * *"
        prune: "0 13 * * *"
      retention:
        keepLast: 5
        keepDaily: 14
  - name: aws
    s3:
      endpoint: https://s3.eu-central-1.amazonaws.com
      secret:
        name: aws-backup-s3-credentials
        accessKey: accessKey
        secretKey: secretKey
        storeRef:
          kind: ClusterSecretStore
          name: aws
    repo:
      secret:
        name: aws-backup-repo-password
        key: password
        storeRef:
          kind: ClusterSecretStore
          name: aws
    default:
      schedule:
        backup: "0 0 * * *"
        check: "30 0 * * *"
        prune: "0 1 * * *"
      retention:
        keepLast: 5
        keepDaily: 14

targetRepository:
  url: https://github.com/wiemanboy/WieCloud.git
  branch: master

applications:
  minecraft:
    deploy: true
    version: 1.2.1
    restores:
      - name: minecraft-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: minecraft-datadir
    world:
      name: cobble-create
      version: 1.21.1
    server:
      launcher: AUTO_CURSEFORGE
      version: java21
    bluemap:
      file: https://www.curseforge.com/minecraft/mc-mods/bluemap/files/6239407
    mods:
      voicechat:
        enabled: true
      vanillaTweaks: []
      modrinth:
        projects: []
      curseforge:
        zip:
          deploy: true
          file: https://next.wieman.cloud/public.php/dav/files/9cNAog5wjTWzPKb
        pageUrl: ""
        excludeMods: []
        includeMods: []

  nextcloud:
    deploy: true
    version: 1.0.4
    cnpg:
      restore: false
    seaweedfs:
      backup:
        enabled: true
      restore:
        enabled: false
    restores:
      - name: nextcloud-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: nextcloud-nextcloud

  satisfactory:
    deploy: true
    version: 0.0.0-implement-satisfactory-77a66c9
    restores:
      - name: server-files-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: satisfactory-server-files
      - name: config-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: satisfactory-config

  website:
    deploy: true
    namespace: website

  repository: harbor.wieman.cloud/applications

infrastructure:
  argocd:
    deploy: true
    version: 0.4.0

  certmanager:
    deploy: true
    version: 0.2.7

  cilium:
    deploy: false
    version: 0.0.0

  cnpg:
    deploy: true
    version: 0.1.0
    seaweedfs:
      backup:
        enabled: true
      restore:
        enabled: false
    restores:
      - name: seaweed-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: seaweed-backup

  envoygateway:
    deploy: true
    version: 0.3.0-implement-satisfactory-77a66c9

  externaldns:
    deploy: true
    version: 0.1.3

  externalsecrets:
    deploy: true
    version: 0.0.2

  harbor:
    deploy: true
    version: 1.3.4
    restores:
      - name: harbor-registry-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: harbor-registry
      - name: harbor-database-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: database-data-harbor-database-0

  k8up:
    deploy: true
    version: 1.0.5

  keycloak:
    deploy: true
    version: 3.0.4
    clientCreationPermissions:
      - name: argocd
        namespace: argocd
      - name: harbor
        namespace: harbor
      - name: nextcloud
        namespace: nextcloud
      - name: grafana
        namespace: prometheus
      - name: longhorn
        namespace: longhorn-system
    cnpg:
      restore: false
    tofudeployer:
      dryRun: false
    restores:
      - name: tfstate-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: tofudeployer-state

  kyverno:
    deploy: true
    version: 0.1.0

  longhorn:
    deploy: true
    version: 0.1.0

  metallb:
    deploy: true
    version: 0.0.11

  metricsserver:
    deploy: true
    version: 0.0.0

  nodes:
    deploy: true
    version: 0.2.0
    proxmox:
      api:
        url: https://192.168.178.166:8006/api2/json
    tofudeployer:
      dryRun: false
    restores:
      - name: tfstate-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: tofudeployer-state

  prometheus:
    deploy: true
    version: 0.0.4

  seaweedfs:
    deploy: true
    version: 0.1.1

  wireguard:
    deploy: true
    version: 0.0.2
    vpn:
      peers:
        - pc
        - laptop
        - s24ultra
      dns:
        - "1.1.1.1"
        - "8.8.8.8"

  repository: harbor.wieman.cloud/infrastructure

# Placeholders so the pipelines will run
products:
  shared:
    version: 0.0.0

images:
  keycloakserver:
    image:
      registry: docker.io
      repository: keycloak/keycloak
      version: 26.6.2

  rconcli:
    image:
      registry: harbor.wieman.cloud
      repository: tools/rconcli
      version: 1.1.5

  satisfactory:
    image:
      registry: docker.io
      repository: wolveix/satisfactory-server
      version: v1.9.10

  tofudeployer:
    image:
      registry: harbor.wieman.cloud
      repository: products/tofudeployer
      version: 0.0.1

  wireguardserver:
    image:
      registry: docker.io
      repository: linuxserver/wireguard
      version: 1.0.20250521
