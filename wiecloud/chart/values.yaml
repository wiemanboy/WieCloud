network:
  hostname: wieman.cloud
  externalIp: 85.148.81.86
  ipPool:
    - 192.168.178.201 - 192.168.178.210
  gateway:
    name: traefik-gateway
    listener: websecure
    namespace: gateway
    certificate:
      email: wiemanboy@gmail.com
      hostnames:
        - "wieman.cloud"
        - "*.wieman.cloud"
        - "*.s3.wieman.cloud"
        - "wiemanboy.com"
        - "*.wiemanboy.com"
        - "jarnowieman.com"
        - "*.jarnowieman.com"
        - "jarnowieman.nl"
        - "*.jarnowieman.nl"
        - "carnaval.lol"
        - "*.carnaval.lol"

auth:
  basic:
    name: basic-auth
    secret:
      name: server-auth-secret
  oidc:
    provider: Keycloak
    endpoint: https://keycloak.wieman.cloud/realms/wiecloud

backups:
  - name: local
    s3:
      endpoint: https://k8up.s3.wieman.cloud
      secret:
        name: local-backup-s3-credentials
        accessKey: accessKey
        secretKey: secretKey
        storeRef:
          kind: ClusterSecretStore
          name: local-backup-s3-credentials-store
    repo:
      secret:
        name: local-backup-repo-password
        key: password
        storeRef:
          kind: ClusterSecretStore
          name: local-backup-repo-password-store
    default:
      schedule:
        backup: "0 12 * * *"
        check: "30 12 * * *"
        prune: "0 13 * * *"
      retention:
        keepLast: 5
        keepDaily: 14
  - name: aws
    s3:
      endpoint: https://s3.eu-central-1.amazonaws.com
      secret:
        name: aws-backup-s3-credentials
        accessKey: accessKey
        secretKey: secretKey
        storeRef:
          kind: ClusterSecretStore
          name: aws
    repo:
      secret:
        name: aws-backup-repo-password
        key: password
        storeRef:
          kind: ClusterSecretStore
          name: aws
    default:
      schedule:
        backup: "0 0 * * *"
        check: "30 0 * * *"
        prune: "0 1 * * *"
      retention:
        keepLast: 5
        keepDaily: 14

targetRepository:
  url: https://github.com/wiemanboy/WieCloud.git
  branch: master

applications:
  minecraft:
    deploy: true
    version: 1.1.2
    restores:
      - name: minecraft-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: minecraft-datadir
    world:
      name: minecraft-for-the-gurls
      version: 1.20.1
    server:
      launcher: AUTO_CURSEFORGE
      version: java21
    bluemap:
      file: https://www.curseforge.com/minecraft/mc-mods/bluemap/files/7057487
    mods:
      vanillaTweaks: []
      modrinth:
        projects: []
      curseforge:
        zip:
          deploy: true
          file: https://next.wieman.cloud/public.php/dav/files/HxMebrnGZSXoSQF/Jarno%20server-1.2.0.zip
        pageUrl: ""
        excludeMods: []
        includeMods: []

  nextcloud:
    deploy: true
    version: 0.2.2
    restores:
      - name: nextcloud-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: nextcloud-nextcloud
      - name: postgresql-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: data-postgresql-db-0

  website:
    deploy: true
    namespace: website

  server: https://kubernetes.default.svc
  repository: harbor.wieman.cloud/applications

infrastructure:
  argocd:
    deploy: true
    version: 0.3.2

  certmanager:
    deploy: true
    version: 0.2.4-implement-envoygateway-1823e04
    certificate:
      email: wiemanboy@gmail.com
      hostnames:
        - "wieman.cloud"
        - "*.wieman.cloud"
        - "*.s3.wieman.cloud"
        - "wiemanboy.com"
        - "*.wiemanboy.com"
        - "jarnowieman.com"
        - "*.jarnowieman.com"
        - "jarnowieman.nl"
        - "*.jarnowieman.nl"
        - "carnaval.lol"
        - "*.carnaval.lol"

  envoygateway:
    deploy: true
    version: 0.0.0-implement-envoygateway-1823e04

  externaldns:
    deploy: true
    version: 0.1.2-implement-envoygateway-1823e04

  externalsecrets:
    deploy: true
    version: 0.0.1

  harbor:
    deploy: true
    version: 1.3.2
    restores:
      - name: harbor-registry-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: harbor-registry
      - name: harbor-database-restore
        enabled: false
        fromBackup: local
        snapshot: ""
        claim:
          name: database-data-harbor-database-0

  k8up:
    deploy: true
    version: 1.0.1

  keycloak:
    deploy: true
    version: 1.2.2
    restores:
      - name: postgresql-restore
        enabled: true
        fromBackup: local
        snapshot: ""
        claim:
          name: data-postgresql-db-0

  longhorn:
    deploy: true
    version: 0.0.8

  metallb:
    deploy: true
    version: 0.0.10

  prometheus:
    deploy: true
    version: 0.0.2

  traefik:
    deploy: true
    version: 0.2.0

  seaweedfs:
    deploy: true
    version: 0.1.0

  wireguard:
    deploy: true
    version: 0.0.1
    vpn:
      peers:
        - pc
        - laptop
        - s24ultra
      dns:
        - "1.1.1.1"
        - "8.8.8.8"

  server: https://kubernetes.default.svc
  repository: harbor.wieman.cloud/infrastructure

images:
  rconcli:
    image:
      registry: harbor.wieman.cloud
      repository: tools/rconcli
      version: 1.1.5

  tofudeployer:
    image:
      registry: harbor.wieman.cloud
      repository: products/tofudeployer
      version: 0.0.1

  postgres:
    image:
      registry: docker.io
      repository: library/postgres
      version: 18.4

  wireguardserver:
    image:
      registry: docker.io
      repository: linuxserver/wireguard
      version: 1.0.20250521
