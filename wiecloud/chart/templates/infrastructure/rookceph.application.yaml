{{- if .Values.infrastructure.rookceph.deploy -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rookceph
  namespace: argocd
spec:
  source:
    chart: rookceph
    repoURL: {{ .Values.infrastructure.repository }}
    targetRevision: {{ .Values.infrastructure.rookceph.version }}
    helm:
      values: |
        environment: {{ toYaml .Values.environment | nindent 10 }}
  destination:
    namespace: rook-ceph
    server: {{ .Values.infrastructure.server }}
  project: infrastructure
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
{{- end }}
