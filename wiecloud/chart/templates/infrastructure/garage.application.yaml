{{- if .Values.infrastructure.garage.deploy -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage
  namespace: argocd
spec:
  source:
    chart: garage
    repoURL: {{ .Values.infrastructure.repository }}
    targetRevision: {{ .Values.infrastructure.garage.version }}
    helm:
      values: |
        environment: {{ toYaml .Values.environment | nindent 10 }}
        garage:
          garage:
            s3:
              api:
                rootDomain: .s3.{{ .Values.environment.hostname }}
              web:
                rootDomain: .web.{{ .Values.environment.hostname }}

  destination:
    namespace: garage
    server: {{ .Values.infrastructure.server }}
  {{- toYaml .Values.infrastructure.defaults | nindent 2 }}
{{- end }}
