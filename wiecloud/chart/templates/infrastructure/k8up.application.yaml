{{- if .Values.infrastructure.k8up.deploy -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8up
  namespace: argocd
spec:
  source:
    chart: k8up
    repoURL: {{ .Values.infrastructure.repository }}
    targetRevision: {{ .Values.infrastructure.k8up.version }}
    helm:
      values: |
        environment: {{ toYaml .Values.environment | nindent 10 }}
        backend:
          s3:
            endpoint: k8up.s3.{{ .Values.environment.hostname }}
  destination:
    namespace: k8up
    server: {{ .Values.infrastructure.server }}
  project: infrastructure
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
{{- end }}
