{{- if .Values.applications.nextcloud.deploy -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud
  namespace: argocd
spec:
  source:
    chart: nextcloud
    repoURL: {{ .Values.applications.repository }}
    targetRevision: {{ .Values.applications.nextcloud.version }}
    helm:
      values: |
        environment: {{ toYaml .Values.environment | nindent 10 }}
        backups: {{ toYaml .Values.backups | nindent 10 }}
        restores: {{ toYaml .Values.applications.nextcloud.restores | nindent 10 }}
        nextcloud:
          nextcloud:
            host: next.{{ .Values.environment.hostname }}

  destination:
    namespace: nextcloud
    server: {{ .Values.applications.server }}
  project: applications
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
{{- end }}
