{{- if .Values.applications.minecraft.deploy -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minecraft
  namespace: argocd
spec:
  source:
    chart: minecraft
    repoURL: {{ .Values.applications.repository }}
    targetRevision: {{ .Values.applications.minecraft.version }}
    helm:
      values: |
        environment: {{ toYaml .Values.environment | nindent 10 }}
        backups: {{ toYaml .Values.backups | nindent 10 }}
        restores: {{ toYaml .Values.applications.minecraft.restores | nindent 10 }}
        rconcli: {{ toYaml .Values.images.rconcli | nindent 10 }}
        minecraft:
          minecraftServer:
            type: {{ .Values.applications.minecraft.launcher }}
            vanillaTweaksShareCodes
            modrinth:
              projects: {{ toYaml .Values.applications.minecraft.mods.modrinth.projects }}
            autoCurseForge:
              pageUrl: {{ .Values.applications.minecraft.mods.curseforge.pageUrl }}
              excludeMods: {{ toYaml .Values.applications.minecraft.mods.curseforge.excludeMods }}
              includeMods: {{ toYaml .Values.applications.minecraft.mods.curseforge.includeMods}}
        extraEnv:
          CURSEFORGE_FILES: | {{- .Values.applications.minecraft.bluemap.file | nindent 12 }}
  destination:
    namespace: minecraft
    server: {{ .Values.applications.server }}
  project: minecraft
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
{{- end }}
