apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-restore
spec:
  schedule: "0 0 31 2 *" # Should never run
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: mc-backup-restore
            image: busybox:1.36
            command:
            - sh
            - -c
            - |
              set -e

              echo "Looking for latest test-* backup in /backups..."
              latest_backup=$(ls -1 /backups/test-* 2>/dev/null | sort | tail -n1)

              if [ -z "$latest_backup" ]; then
                echo "No test-* backup found. Exiting."
                exit 1
              fi

              echo "Latest backup found: $latest_backup"
              echo "Extracting into /data..."
              tar -xzf "$latest_backup" -C /data
              echo "Restore complete."
            volumeMounts:
            - name: datadir
              mountPath: /data
            - name: backupdir
              mountPath: /backups
              readOnly: true
          volumes:
          - name: datadir
            persistentVolumeClaim:
              claimName: minecraft-datadir
          - name: backupdir
            persistentVolumeClaim:
              claimName: minecraft-backupdir
