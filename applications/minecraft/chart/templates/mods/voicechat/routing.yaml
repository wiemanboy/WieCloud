{{- if .Values.minecraft.minecraftServer.voicechat.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: voicechat
spec:
  type: ClusterIP
  selector:
    app: minecraft
  ports:
    - port: 24454
      targetPort: 24454
      protocol: UDP
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: voicechat
spec:
  parentRefs:
    - name: {{ .Values.network.gateway.name }}
      sectionName: minecraft-voicechat
      namespace: {{ .Values.network.gateway.namespace }}

  rules:
    - backendRefs:
        - name: voicechat
          namespace: {{ .Release.Namespace }}
          port: 24454
{{- end -}}
