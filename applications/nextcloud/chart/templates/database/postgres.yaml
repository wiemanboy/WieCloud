apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.nextcloud.externalDatabase.host }}
spec:
  selector:
    app: postgresql-db
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-db
spec:
  serviceName: {{ .Values.nextcloud.externalDatabase.host }}
  replicas: 1
  selector:
    matchLabels:
      app: postgresql-db
  template:
    metadata:
      labels:
        app: postgresql-db
    spec:
      containers:
        - name: postgresql-db
          {{ with .Values.images.postgres.image -}}
          image: {{ .registry }}/{{ .repository }}:{{ .version }}
          {{ end -}}
          volumeMounts:
            - name: data
              mountPath: /data
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nextcloud.externalDatabase.existingSecret.secretName }}
                  key: {{ .Values.nextcloud.externalDatabase.existingSecret.usernameKey }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nextcloud.externalDatabase.existingSecret.secretName }}
                  key: {{ .Values.nextcloud.externalDatabase.existingSecret.passwordKey }}
            - name: POSTGRES_DB
              value: nextcloud
            - name: PGDATA
              value: /data/pgdata
  volumeClaimTemplates:
  - metadata:
      name: data
      annotations:
        k8up.io/backup: "true"
      labels:
        next.wieman.cloud/workload: "postgres"
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
