apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud-db-credentials
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws
  target:
    name: nextcloud-db-credentials
  data:
    - secretKey: username
      remoteRef:
        key: nextcloud-db-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: nextcloud-db-credentials
        property: password
